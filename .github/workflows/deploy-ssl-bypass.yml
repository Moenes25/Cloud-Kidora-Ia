---
name: Deploy Infrastructure (SSL Bypass)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GIT_SSL_NO_VERIFY: "true"
      CURL_CA_BUNDLE: ""
      REQUESTS_CA_BUNDLE: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Disable SSL verification for Git
        run: |
          git config --global http.sslVerify "false"
          git config --global https.sslVerify "false"

      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible
          pip install community.docker

      - name: Deploy MinIO and Zot Registry
        env:
          ANSIBLE_HOST_KEY_CHECKING: false
          ANSIBLE_HOST: "${{ secrets.ANSIBLE_HOST }}"
          ANSIBLE_USER: "${{ secrets.ANSIBLE_USER }}"
          ANSIBLE_SSH_KEY: "${{ secrets.ANSIBLE_SSH_KEY }}"
        run: |
          echo "$ANSIBLE_SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          ansible-playbook kidora-infra/ansible/playbooks/main.yml --extra-vars "ansible_ssh_private_key_file=/tmp/ssh_key"