# ═══════════════════════════════════════════════════════
# Kidora — Docker Compose (Production)
# ═══════════════════════════════════════════════════════
# Production version with monitoring stack included.
# Uses Hetzner volumes for persistent storage.
# ═══════════════════════════════════════════════════════

services:

  # ── Reverse Proxy ─────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: kidora-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${EMAIL_FOR_SSL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "${DATA_MOUNT_POINT}/traefik:/letsencrypt"
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN_NAME}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_ADMIN_USER:-admin}:${TRAEFIK_ADMIN_PASSWORD_HASH}"
    networks:
      - kidora-net

  # ── PostgreSQL ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kidora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - "${DATA_MOUNT_POINT}/postgres:/var/lib/postgresql/data"
      - "./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro"
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
    networks:
      - kidora-net

  # ── MinIO ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: kidora-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - ./minio/config.env
    volumes:
      - "${DATA_MOUNT_POINT}/minio:/data"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
    networks:
      - kidora-net

  # ── Backend ───────────────────────────────────
  backend:
    image: ghcr.io/moenes25/client-kidora-backend:latest
    container_name: kidora-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 10MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 50MB
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      UPLOAD_DIR: /app/uploads
      SERVER_PORT: 8080
    volumes:
      - "${DATA_MOUNT_POINT}/uploads:/app/uploads"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.${DOMAIN_NAME}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
    networks:
      - kidora-net

  # ── Frontend ──────────────────────────────────
  frontend:
    image: ghcr.io/moenes25/client-kidora-frontend:latest
    container_name: kidora-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
    networks:
      - kidora-net

  # ── Prometheus ────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53
    container_name: kidora-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-30}d"
    volumes:
      - "./prometheus:/etc/prometheus"
      - "${DATA_MOUNT_POINT}/prometheus:/prometheus"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - kidora-net

  # ── Grafana ───────────────────────────────────
  grafana:
    image: grafana/grafana:11.1
    container_name: kidora-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - "${DATA_MOUNT_POINT}/grafana:/var/lib/grafana"
      - "./grafana:/etc/grafana/provisioning:ro"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - kidora-net

  # ── Loki (Log Aggregation) ────────────────────
  loki:
    image: grafana/loki:3.1
    container_name: kidora-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - "./loki:/etc/loki"
      - "${DATA_MOUNT_POINT}/loki:/loki"
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - kidora-net

  # ── Promtail (Log Collector) ──────────────────
  promtail:
    image: grafana/promtail:3.1
    container_name: kidora-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - "./promtail:/etc/promtail"
      - "/var/log:/var/log:ro"
      - "/var/lib/docker/containers:/var/lib/docker/containers:ro"
    networks:
      - kidora-net

  # ── Alertmanager ──────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27
    container_name: kidora-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - "./alertmanager:/etc/alertmanager"
      - "${DATA_MOUNT_POINT}/alertmanager:/alertmanager"
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - kidora-net

networks:
  kidora-net:
    driver: bridge
