# ═══════════════════════════════════════════════════════
# Traefik — Static Configuration
# ═══════════════════════════════════════════════════════

api:
  dashboard: true
  debug: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    directory: /dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@example.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
      # Staging server for testing (uncomment for dev):
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory