name: Deploy

on:
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to update (space-separated)'
        required: false
        default: 'backend frontend'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/kidora
            docker-compose -f docker-compose.prod.yml pull ${{ github.event.inputs.services }}
            docker-compose -f docker-compose.prod.yml up -d --force-recreate ${{ github.event.inputs.services }}
            docker image prune -f