# ═══════════════════════════════════════════════
# Kidora — Staging Ansible Inventory
# ═══════════════════════════════════════════════
# For testing, can use a smaller CX11 instance.
# ═══════════════════════════════════════════════

all:
  children:
    staging:
      hosts:
        kidora-staging:
          ansible_host: "YOUR_STAGING_SERVER_IP"
          ansible_user: root
          ansible_ssh_private_key_file: "~/.ssh/id_rsa"
          ansible_python_interpreter: /usr/bin/python3
          ansible_become: true

          host_vars:
            domain_name: "staging.kidora.example.com"
            email_for_ssl: "admin@example.com"
            server_timezone: "Africa/Tunis"

          docker_compose_dir: "/opt/kidora"
          docker_compose_file: "docker-compose.yml"

          data_mount_point: "/mnt/data"
          backup_mount_point: "/mnt/backup"

          postgres_db: "kidora_staging"
          postgres_user: "kidora"
          postgres_password: "{{ vault_postgres_password }}"
          postgres_port: 5432

          minio_root_user: "minioadmin"
          minio_root_password: "{{ vault_minio_password }}"
          minio_port: 9000
          minio_console_port: 9001

          app_backend_port: 8080
          app_frontend_port: 80

          grafana_admin_password: "{{ vault_grafana_password }}"
          prometheus_retention_days: 7