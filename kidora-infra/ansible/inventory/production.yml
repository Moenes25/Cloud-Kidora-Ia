# ═══════════════════════════════════════════════
# Kidora — Production Ansible Inventory
# ═══════════════════════════════════════════════
# Single-machine Hetzner setup.
# Update the host IP after Terraform provisioning.
# ═══════════════════════════════════════════════

all:
  children:
    production:
      hosts:
        kidora-server:
          ansible_host: "YOUR_SERVER_IP"        # Replace with output from terraform
          ansible_user: root
          ansible_ssh_private_key_file: "~/.ssh/id_rsa"
          ansible_python_interpreter: /usr/bin/python3
          ansible_become: true

          # Host-specific variables
          host_vars:
            domain_name: "kidora.example.com"
            email_for_ssl: "admin@example.com"
            server_timezone: "Africa/Tunis"

          # Docker Compose project settings
          docker_compose_dir: "/opt/kidora"
          docker_compose_file: "docker-compose.prod.yml"

          # Volume mount points (Hetzner volumes)
          data_mount_point: "/mnt/data"
          backup_mount_point: "/mnt/backup"

          # PostgreSQL
          postgres_db: "kidora"
          postgres_user: "kidora"
          postgres_password: "{{ vault_postgres_password }}"
          postgres_port: 5432

          # MinIO
          minio_root_user: "minioadmin"
          minio_root_password: "{{ vault_minio_password }}"
          minio_port: 9000
          minio_console_port: 9001

          # Application
          app_backend_port: 8080
          app_frontend_port: 80

          # Monitoring
          grafana_admin_password: "{{ vault_grafana_password }}"
          prometheus_retention_days: 30