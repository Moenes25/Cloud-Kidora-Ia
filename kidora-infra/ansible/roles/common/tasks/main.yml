---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes

- name: Install common packages
  apt:
    name: "{{ common_packages }}"
    state: present

- name: Configure timezone
  timezone:
    name: "{{ common_timezone }}"
  notify: restart timesyncd

- name: Configure NTP servers
  lineinfile:
    path: /etc/systemd/timesyncd.conf
    regexp: "^#?NTP="
    line: "NTP={{ common_ntp_servers | join(' ') }}"
  notify: restart timesyncd

- name: Enable and start systemd-timesyncd
  systemd:
    name: systemd-timesyncd
    enabled: yes
    state: started

- name: Set systemd-timesyncd service state
  service:
    name: systemd-timesyncd
    state: started
    enabled: yes

- name: Enable unattended upgrades
  apt:
    name: unattended-upgrades
    state: present
  when: common_enable_unattended_upgrades | bool

- name: Configure unattended upgrades
  copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}-security";
        "${distro_id}:${distro_codename}-updates";
      };
      Unattended-Upgrade::Auto-Fix "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
  when: common_enable_unattended_upgrades | bool

- name: Enable automatic apt updates
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
      APT::Periodic::Unattended-Upgrade "1";
  when: common_enable_unattended_upgrades | bool

- name: Set sysctl settings for better performance
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  with_dict:
    vm.swappiness: 10
    net.core.somaxconn: 65535
    net.ipv4.tcp_max_syn_backlog: 65535

- name: Create swap file if not exists
  shell: |
    if [ ! -f /swapfile ]; then
      fallocate -l 1G /swapfile
      chmod 600 /swapfile
      mkswap /swapfile
      swapon /swapfile
      echo '/swapfile none swap sw 0 0' >> /etc/fstab
    fi
  args:
    creates: /swapfile