---
# SSH Port (change to a non-standard port for security)
ssh_port: 22

# Authentication settings
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_pubkey_authentication: "yes"
ssh_challenge_response_auth: "no"
ssh_empty_passwords: "no"
ssh_kerberos_authentication: "no"
ssh_gssapi_authentication: "no"
ssh_hostbased_authentication: "no"
ssh_ignore_rhosts: "yes"
ssh_rhosts_rsa_authentication: "no"

# Access control
ssh_allow_users: ""
ssh_allow_groups: "kidora_admin kidora_dev"
ssh_deny_users: ""
ssh_deny_groups: ""

# Connection settings
ssh_max_auth_tries: 3
ssh_max_sessions: 5
ssh_max_startups: "10:30:60"
ssh_login_grace_time: 30
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2
ssh_tcp_keep_alive: "no"
ssh_compression: "no"

# Forwarding
ssh_x11_forwarding: "no"
ssh_agent_forwarding: "no"
ssh_allow_tcp_forwarding: "no"
ssh_gateway_ports: "no"
ssh_permit_tunnel: "no"

# Logging
ssh_log_level: "VERBOSE"
ssh_syslog_facility: "AUTH"

# Ciphers and algorithms (strong only)
ssh_ciphers: "chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr"
ssh_kex_algorithms: "curve25519-sha256@libssh.org,diffie-hellman-group-exchange-sha256"
ssh_macs: "hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com"
ssh_host_key_algorithms: "ssh-ed25519-cert-v01@openssh.com,ssh-ed25519,rsa-sha2-512-cert-v01@openssh.com,rsa-sha2-512"

# Other security settings
ssh_print_motd: "yes"
ssh_print_last_log: "yes"
ssh_use_pam: "yes"
ssh_strict_modes: "yes"
ssh_permit_user_environment: "no"
ssh_allow_agent_forwarding: "no"