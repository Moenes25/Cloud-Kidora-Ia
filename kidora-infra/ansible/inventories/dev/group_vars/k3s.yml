---
# K3s cluster variables - Dev

# K3s server IP
k3s_server_ip: <MASTER_IP>

# K3s token (auto-generated on first master)
k3s_token: "{{ lookup('password', '/tmp/k3s_token chars=ascii_lowercase+digits length=32') }}"

# TLS SAN for K3s API server
k3s_tls_san: "{{ k3s_server_ip }}"

# K3s execution parameters
k3s_exec: "--write-kubeconfig-mode 600 --tls-san {{ k3s_tls_san }}"