# ═══════════════════════════════════════════════════════
# PostgreSQL — Database initialization and management
# ═══════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════

- name: Configure PostgreSQL
  hosts: all
  gather_facts: no

  tasks:
    - name: Ensure PostgreSQL data directory exists
      file:
        path: "{{ data_mount_point }}/postgres"
        state: directory
        mode: 0700

    - name: Copy PostgreSQL init script
      copy:
        src: "{{ playbook_dir }}/../../docker/postgres/init.sql"
        dest: "{{ docker_compose_dir }}/postgres/init.sql"
        mode: 0644

    - name: Deploy/restart PostgreSQL
      docker_compose:
        project_src: "{{ docker_compose_dir }}"
        files:
          - "{{ docker_compose_file }}"
        services:
          - postgres
        state: present
        restarted: yes

    - name: Wait for PostgreSQL to be ready
      wait_for:
        port: "{{ postgres_port }}"
        host: "{{ ansible_host }}"
        timeout: 60
        sleep: 5

    - name: Run database migrations (placeholder)
      debug:
        msg: "Database migrations would run here. Implement with your specific migration tool."