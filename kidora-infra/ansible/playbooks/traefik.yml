# ═══════════════════════════════════════════════════════
# Traefik — Reverse proxy and SSL management
# ═══════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════

- name: Configure Traefik
  hosts: all
  gather_facts: no

  tasks:
    - name: Ensure Traefik directories exist
      file:
        path: "{{ docker_compose_dir }}/traefik/{{ item }}"
        state: directory
        mode: 0755
      loop:
        - dynamic
        - certs

    - name: Deploy Traefik static config
      copy:
        src: "{{ playbook_dir }}/../../docker/traefik/traefik.yml"
        dest: "{{ docker_compose_dir }}/traefik/traefik.yml"
        mode: 0644

    - name: Deploy Traefik dynamic config
      template:
        src: traefik-dynamic.yml.j2
        dest: "{{ docker_compose_dir }}/traefik/dynamic/traefik-dynamic.yml"
        mode: 0644

    - name: Restart Traefik
      docker_compose:
        project_src: "{{ docker_compose_dir }}"
        files:
          - "{{ docker_compose_file }}"
        services:
          - traefik
        state: present
        restarted: yes