# ═══════════════════════════════════════════════════════
# Monitoring — Prometheus, Grafana, Loki stack
# ═══════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════

- name: Deploy monitoring stack
  hosts: all
  gather_facts: no

  tasks:
    - name: Ensure monitoring directories exist
      file:
        path: "{{ docker_compose_dir }}/{{ item }}"
        state: directory
        mode: 0755
      loop:
        - prometheus
        - grafana
        - alertmanager
        - loki
        - promtail

    - name: Copy Prometheus config
      synchronize:
        src: "{{ playbook_dir }}/../../monitoring/prometheus/"
        dest: "{{ docker_compose_dir }}/prometheus/"
        delete: yes

    - name: Copy Grafana configs
      synchronize:
        src: "{{ playbook_dir }}/../../monitoring/grafana/"
        dest: "{{ docker_compose_dir }}/grafana/"
        delete: yes

    - name: Copy Alertmanager config
      synchronize:
        src: "{{ playbook_dir }}/../../monitoring/alertmanager/"
        dest: "{{ docker_compose_dir }}/alertmanager/"
        delete: yes

    - name: Copy Loki config
      synchronize:
        src: "{{ playbook_dir }}/../../monitoring/loki/"
        dest: "{{ docker_compose_dir }}/loki/"
        delete: yes

    - name: Copy Promtail config
      synchronize:
        src: "{{ playbook_dir }}/../../monitoring/promtail/"
        dest: "{{ docker_compose_dir }}/promtail/"
        delete: yes

    - name: Deploy monitoring stack
      docker_compose:
        project_src: "{{ docker_compose_dir }}"
        files:
          - "{{ docker_compose_file }}"
        services:
          - prometheus
          - grafana
          - alertmanager
          - loki
          - promtail
        state: present
        restarted: yes