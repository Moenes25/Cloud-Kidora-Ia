# ═══════════════════════════════════════════════════════
# Docker — Deploy the Docker Compose stack
# ═══════════════════════════════════════════════════════
# Copies docker-compose files and supporting configs
# to the server, then deploys the stack.
# ═══════════════════════════════════════════════════════

- name: Deploy Docker Compose stack
  hosts: all
  gather_facts: no

  tasks:
    - name: Ensure target directories exist
      file:
        path: "{{ docker_compose_dir }}/{{ item }}"
        state: directory
        mode: 0755
      loop:
        - postgres
        - minio
        - traefik
        - traefik/dynamic
        - prometheus
        - grafana
        - alertmanager
        - loki
        - promtail

    # ── Copy configuration files ─────────────────
    - name: Copy docker-compose files
      synchronize:
        src: "{{ playbook_dir }}/../../docker/"
        dest: "{{ docker_compose_dir }}"
        delete: no
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.env.example"

    - name: Copy monitoring configs
      synchronize:
        src: "{{ playbook_dir }}/../../monitoring/"
        dest: "{{ docker_compose_dir }}"
        delete: no
        rsync_opts:
          - "--exclude=.git"

    # ── Environment files ────────────────────────
    - name: Create .env file for docker-compose
      copy:
        dest: "{{ docker_compose_dir }}/.env"
        content: |
          # ── Generated by Ansible ──
          DOMAIN_NAME={{ domain_name }}
          EMAIL_FOR_SSL={{ email_for_ssl }}

          # PostgreSQL
          POSTGRES_DB={{ postgres_db }}
          POSTGRES_USER={{ postgres_user }}
          POSTGRES_PASSWORD={{ postgres_password }}
          POSTGRES_PORT={{ postgres_port }}

          # MinIO
          MINIO_ROOT_USER={{ minio_root_user }}
          MINIO_ROOT_PASSWORD={{ minio_root_password }}
          MINIO_PORT={{ minio_port }}
          MINIO_CONSOLE_PORT={{ minio_console_port }}

          # Application
          APP_BACKEND_PORT={{ app_backend_port }}
          APP_FRONTEND_PORT={{ app_frontend_port }}

          # Monitoring
          GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password }}
          PROMETHEUS_RETENTION_DAYS={{ prometheus_retention_days }}

          # Volume mounts
          DATA_MOUNT_POINT={{ data_mount_point }}
          BACKUP_MOUNT_POINT={{ backup_mount_point }}
        mode: 0600

    # ── MinIO config ─────────────────────────────
    - name: Copy MinIO config
      copy:
        src: "{{ playbook_dir }}/../../docker/minio/config.env"
        dest: "{{ docker_compose_dir }}/minio/config.env"
        mode: 0600

    # ── Traefik dynamic config ──────────────────
    - name: Generate Traefik dynamic config
      template:
        src: traefik-dynamic.yml.j2
        dest: "{{ docker_compose_dir }}/traefik/dynamic/traefik-dynamic.yml"
        mode: 0644

    # ── Deploy stack ─────────────────────────────
    - name: Deploy Docker Compose stack
      docker_compose:
        project_src: "{{ docker_compose_dir }}"
        files:
          - "{{ docker_compose_file }}"
        state: present
        recreate: always
      register: deploy_result

    - name: Show deployment result
      debug:
        var: deploy_result