---
- name: Install Docker on Ubuntu
  hosts: all
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Create Docker keyring directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /tmp/docker.asc
        mode: "0644"

    - name: Convert GPG key
      shell: |
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding repository
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest

    - name: Enable Docker service
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add current user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Install CA certificate for trusted registry
      copy:
        src: ../files/cert.pem
        dest: /usr/local/share/ca-certificates/zot-ca.crt
        mode: '0644'

    - name: Update CA certificates on target host
      shell: update-ca-certificates

    - name: Configure Docker daemon for TLS registry
      copy:
        content: |
          {
            "registry-mirrors": [],
            "insecure-registries": []
          }
        dest: /etc/docker/daemon.json

    - name: Restart Docker service
      systemd:
        name: docker
        state: restarted