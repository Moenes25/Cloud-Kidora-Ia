# ═══════════════════════════════════════════════════════
# Backup — Database dumps and file backups
# ═══════════════════════════════════════════════════════
# Configures cron jobs for automated backups.
# ═══════════════════════════════════════════════════════

- name: Configure backups
  hosts: all
  gather_facts: no

  vars:
    backup_scripts:
      - src: "{{ playbook_dir }}/../../scripts/backup.sh"
        dest: "{{ docker_compose_dir }}/scripts/backup.sh"
      - src: "{{ playbook_dir }}/../../scripts/restore.sh"
        dest: "{{ docker_compose_dir }}/scripts/restore.sh"
      - src: "{{ playbook_dir }}/../../scripts/cleanup.sh"
        dest: "{{ docker_compose_dir }}/scripts/cleanup.sh"

  tasks:
    - name: Copy backup scripts to server
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: 0755
      loop: "{{ backup_scripts }}"

    - name: Ensure backup directory exists
      file:
        path: "{{ backup_mount_point }}/postgres"
        state: directory
        mode: 0755

    - name: Schedule daily PostgreSQL backup via cron
      cron:
        name: "PostgreSQL daily backup"
        minute: "0"
        hour: "2"
        job: "{{ docker_compose_dir }}/scripts/backup.sh postgres {{ backup_mount_point }}/postgres 2>&1 | logger -t kidora-backup"

    - name: Schedule weekly uploads backup
      cron:
        name: "Uploads weekly backup"
        minute: "0"
        hour: "3"
        weekday: "0"
        job: "{{ docker_compose_dir }}/scripts/backup.sh uploads {{ backup_mount_point }}/uploads 2>&1 | logger -t kidora-backup"

    - name: Schedule monthly cleanup of old backups
      cron:
        name: "Cleanup old backups (older than 30 days)"
        minute: "0"
        hour: "4"
        day: "1"
        job: "{{ docker_compose_dir }}/scripts/cleanup.sh {{ backup_mount_point }} 30 2>&1 | logger -t kidora-cleanup"