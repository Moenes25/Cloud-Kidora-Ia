version: '3.8'

services:
  ai-backend:
    image: fra.vultrcr.com/kidora/kidora-ai-backend:latest
    container_name: kidora_ai_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL_NAME=${GROQ_MODEL_NAME:-llama-3.3-70b-versatile}
      - GROQ_VISION_MODEL=${GROQ_VISION_MODEL:-llama-3.2-90b-vision-preview}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - LLM_MEMORY_WINDOW=${LLM_MEMORY_WINDOW:-10}
      - APP_NAME=${APP_NAME:-Générateur de Rapports Éducatifs IA}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://kidora.freeddns.org}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BFL_API_KEY=${BFL_API_KEY}
      - IMAGE_PROVIDER=${IMAGE_PROVIDER:-gemini}
      - POLLINATIONS_API_KEY=${POLLINATIONS_API_KEY}
    volumes:
      - /opt/ai-backend/uploads:/app/uploads
    networks:
      - kidora_net
    depends_on:
      - mongodb
      - minio

networks:
  kidora_net:
    external: true
    name: cloud-kidora-ia_kidora_net
