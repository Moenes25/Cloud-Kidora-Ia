server {
    listen 80;
    server_name kidora.freeddns.org;

    return 301 https://$host$request_uri;
}


server {
    listen 443 ssl;
    server_name kidora.freeddns.org;


    ssl_certificate /etc/letsencrypt/live/kidora.freeddns.org-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kidora.freeddns.org-0001/privkey.pem;


    location / {
        proxy_pass http://frontend:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend:8086;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Mobile app API (controllers_mobile: /mobile, /mobile/auth,
    # /mobile/chat, /mobile/payment, /mobile/presence, /mobile/notes,
    # /mobile/repas, /mobile/ai, /mobile/notification, etc.)
    location /mobile/ {
        proxy_pass http://backend:8086;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


     location /ws/ {
         proxy_pass http://backend:8086;

         proxy_http_version 1.1;
         proxy_set_header Upgrade $http_upgrade;
         proxy_set_header Connection "upgrade";
     }

      location /kidora/ {
          proxy_pass http://minio:9000/kidora/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
      }

      location /uploads/ {
          proxy_pass http://minio:9000/kidora/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
      }

      # AI Backend API endpoint
      location /ai/ {
          proxy_pass http://ai-backend:8000/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
      }
      location /api/ai/ {
          proxy_pass http://ai-backend:8000/api/ai/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }
}
