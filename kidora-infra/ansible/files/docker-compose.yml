services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Rc3fceIrF_3_fd1_Zv2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /data/minio:/data
    networks:
      - kidora_net

  mc:
    image: minio/mc:latest
    container_name: minio_mc
    depends_on:
      - minio
    restart: "no"
    networks:
      - kidora_net
    entrypoint: >
      /bin/sh -c " until mc alias set local http://minio:9000 admin 'Rc3fceIrF_3_fd1_Zv2026'; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done; mc mb --ignore-existing local/kidora; mc anonymous set download local/kidora; echo 'MinIO configured.'; "

  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: Rc@3é1fceIrF_3@àfd1&Zv
    ports:
      - "27017:27017"
    volumes:
      - /data/mongodb:/data/db
    networks:
      - kidora_net

  zot:
    image: ghcr.io/project-zot/zot:latest
    container_name: zot
    restart: unless-stopped
    networks:
      - kidora_net
    ports:
      - "5000:5000"
    volumes:
      - /opt/zot:/etc/zot:ro
      - /opt/storage:/var/lib/registry
      - /opt/zot/certs:/etc/zot/certs:ro
    command:
      - serve
      - /etc/zot/config.json

  backend:
    image: fra.vultrcr.com/kidora/kidora-backend:v1.0.0
    container_name: backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - minio
    volumes:
      - ./uploads:/app/uploads
    expose:
      - "8086"
    ports:
      - "8086:8086"
    networks:
      - kidora_net

  frontend:
    image: fra.vultrcr.com/kidora/kidora-frontend:v1.0.0
    container_name: frontend
    restart: unless-stopped
    depends_on:
      #- backend
      - ai-backend
    expose:
      - "80"
    networks:
      - kidora_net

  # AI Backend Service - Using Vultr Registry
  ai-backend:
    image: fra.vultrcr.com/kidora/kidora-ai-backend:v1.0.0
    container_name: kidora_ai_backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL_NAME=${GROQ_MODEL_NAME:-llama-3.3-70b-versatile}
      - GROQ_VISION_MODEL=${GROQ_VISION_MODEL:-llama-3.2-90b-vision-preview}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - LLM_MEMORY_WINDOW=${LLM_MEMORY_WINDOW:-10}
      - APP_NAME=${APP_NAME:-Générateur de Rapports Éducatifs IA}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://kidora.freeddns.org}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BFL_API_KEY=${BFL_API_KEY}
      - IMAGE_PROVIDER=${IMAGE_PROVIDER:-gemini}
      - POLLINATIONS_API_KEY=${POLLINATIONS_API_KEY}
      - SPRING_BOOT_BASE_URL=${SPRING_BOOT_BASE_URL:-http://backend:8086}
    volumes:
      - /opt/ai-backend/uploads:/app/uploads
    networks:
      - kidora_net
    depends_on:
      - mongodb
      - minio

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - ai-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - kidora_net

networks:
  kidora_net:
    driver: bridge
