# ═══════════════════════════════════════════════════════
# Alertmanager Configuration
# ═══════════════════════════════════════════════════════

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

receivers:
  - name: 'default'
    email_configs:
      - to: 'admin@example.com'
        from: 'alertmanager@kidora.example.com'
        smarthost: 'smtp.example.com:587'
        auth_username: 'admin@example.com'
        auth_password: 'CHANGE_ME'
        send_resolved: true

  # Uncomment for Slack integration:
  # - name: 'slack'
  #   slack_configs:
  #     - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
  #       channel: '#alerts'
  #       send_resolved: true