services:
  zot:
    image: ghcr.io/project-zot/zot:latest
    container_name: zot
    restart: unless-stopped
    networks:
      - kidora_net
    ports:
      - "5000:5000"
    volumes:
      - /opt/zot:/etc/zot:ro
      - /opt/storage:/var/lib/registry
      - /opt/zot/certs:/etc/zot/certs:ro
    command:
      - serve
      - /etc/zot/config.json