services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /data/minio:/data
    networks:
      - kidora_net

  mc:
    image: minio/mc:latest
    container_name: minio_mc
    depends_on:
      - minio
    restart: "no"
    networks:
      - kidora_net
    entrypoint: >
      /bin/sh -c " until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} '${MINIO_ROOT_PASSWORD}'; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done; mc mb --ignore-existing local/kidora; mc anonymous set download local/kidora; echo 'MinIO configured.'; "