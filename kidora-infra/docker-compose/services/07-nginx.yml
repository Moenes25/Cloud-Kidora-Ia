services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - ai-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - kidora_net